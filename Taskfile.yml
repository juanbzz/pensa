version: '3'

vars:
  BIN_NAME: pensa
  VERSION:
    sh: git describe --tags --always --dirty 2>/dev/null || echo "dev"

tasks:
  build:local:
    desc: Build pensa and install to ~/.bin
    cmds:
      - go build -ldflags "-X github.com/juanbzz/pensa/internal/cli.Version={{.VERSION}}" -o ~/.bin/{{.BIN_NAME}} ./cmd/pensa
    sources:
      - ./**/*.go
    generates:
      - ~/.bin/{{.BIN_NAME}}

  build:
    desc: Build pensa binary
    cmds:
      - go build -ldflags "-X github.com/juanbzz/pensa/internal/cli.Version={{.VERSION}}" -o ./{{.BIN_NAME}} ./cmd/pensa

  test:
    desc: Run unit tests
    cmds:
      - go test ./... -timeout 30s

  test:integration:
    desc: Run integration tests (requires Docker)
    cmds:
      - go test -tags=integration -timeout 300s -v ./test/integration/

  vet:
    desc: Run go vet
    cmds:
      - go vet ./...

  check:
    desc: Run vet + all unit tests
    cmds:
      - task: vet
      - task: test
