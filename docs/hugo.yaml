baseURL: https://pensa.sh/
languageCode: en-us
title: pensa

module:
  imports:
    - path: github.com/imfing/hextra

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false

enableRobotsTXT: true

menu:
  main:
    - name: Docs
      pageRef: /docs
      weight: 1
    - name: Blog
      pageRef: /blog
      weight: 2
    - name: GitHub
      url: https://github.com/juanbzz/pensa
      weight: 3

params:
  description: A fast enough Python package and project manager, written in Go.
  navbar:
    displayTitle: true
    displayLogo: false
  footer:
    displayCopyright: false
    displayPoweredBy: false
  editURL:
    enable: true
    base: https://github.com/juanbzz/pensa/edit/main/docs/content
